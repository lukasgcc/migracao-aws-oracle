map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name ourcraft.com.br www.ourcraft.com.br painel.ourcraft.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ourcraft.com.br www.ourcraft.com.br;
    ssl_certificate /etc/letsencrypt/live/ourcraft.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ourcraft.com.br/privkey.pem;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }
}


server {
    listen 443 ssl;
    server_name painel.ourcraft.com.br;
    ssl_certificate /etc/letsencrypt/live/ourcraft.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ourcraft.com.br/privkey.pem;
    client_max_body_size 1024M;
    location /api/status {
        proxy_pass http://api:8080/status; # Direciona especificamente para o endpoint Java
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location / {
        proxy_pass https://147.15.75.146:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect https://147.15.75.146:8443/ /;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_ssl_verify off;  
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
