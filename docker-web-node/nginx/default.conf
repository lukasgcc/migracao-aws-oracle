server {
    listen 80;
    server_name ourcraft.com.br www.ourcraft.com.br painel.ourcraft.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ourcraft.com.br www.ourcraft.com.br;
    ssl_certificate /etc/letsencrypt/live/ourcraft.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ourcraft.com.br/privkey.pem;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name painel.ourcraft.com.br;
    ssl_certificate /etc/letsencrypt/live/ourcraft.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ourcraft.com.br/privkey.pem;
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass https://147.15.75.146:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_ssl_verify off;
    }
}
